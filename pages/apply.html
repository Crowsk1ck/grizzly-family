<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заявка</title>
<style>
body{margin:0;font-family:Arial;background:#000;color:white;padding-top:90px;overflow-x:hidden}
.bgvideo{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:-2;filter:brightness(.25)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:-1}
nav{position:fixed;top:0;left:0;width:100%;display:flex;gap:10px;padding:15px;background:rgba(0,0,0,.55);overflow-x:auto;z-index:999}
nav a{color:white;text-decoration:none;padding:10px 14px;background:#1b1b1b;border-radius:10px;white-space:nowrap}
.container{padding:30px}
.title{font-size:48px;color:#ff004c}
#musicBtn{position:fixed;bottom:20px;right:20px;padding:12px 16px;border:none;border-radius:10px;background:#ff004c;color:white;cursor:pointer;z-index:9999}
#discordProfile{position:fixed;top:90px;right:20px;display:none;align-items:center;gap:12px;background:rgba(20,20,20,.95);padding:12px;border-radius:14px;z-index:9999}
#discordAvatar{width:50px;height:50px;border-radius:50%;border:2px solid #ff004c}
#logoutBtn{padding:8px 12px;border:none;border-radius:10px;background:#ff004c;color:white;cursor:pointer;margin-top:5px}
#authOverlay{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background:#000;z-index:10000}
.loginBtn{display:inline-block;padding:14px 22px;border-radius:12px;background:#ff004c;color:white;text-decoration:none;margin-top:20px}
</style>
</head>
<body>

<video class="bgvideo" autoplay muted loop>
<source src="/grizzly-family/assets/media/background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<audio id="bgmusic" autoplay loop>
<source src="/grizzly-family/assets/media/music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">MUSIC</button>
  
<h1 class="title">APPLICATION</h1>
<div class="card">
<form id="appForm">
<input id="nick" type="text" placeholder="Нік" required>
<input id="discord" type="text" placeholder="Discord" required>
<input id="telegram" type="text" placeholder="Telegram" required>
<textarea id="reason" placeholder="Причина вступу" required></textarea>
<button class="submitBtn" id="submitBtn" type="submit">
ПОДАТИ ЗАЯВКУ
</button>
</form>
  
<div id="authOverlay">
<div style="text-align:center">
<h1 style="color:#ff004c">GRIZZLY FAMILY</h1>
<a class="loginBtn" href="https://discord.com/oauth2/authorize?client_id=1506029366008610856&response_type=token&redirect_uri=https%3A%2F%2Fcrowsk1ck.github.io%2Fgrizzly-family&scope=identify%20email">LOGIN WITH DISCORD</a>
</div>
</div>

<div id="discordProfile">
<img id="discordAvatar">
<div>
<div id="discordName"></div>
<button id="logoutBtn">LOGOUT</button>
</div>
</div>

<nav>
<a href="/grizzly-family/index.html">Інфо</a>
<a href="/grizzly-family/pages/team.html">Команда</a>
<a href="/grizzly-family/pages/gallery.html">Галерея</a>
<a href="/grizzly-family/pages/contracts.html">Контракти</a>
<a href="/grizzly-family/pages/apply.html">Заявка</a>
</nav>

<div class="container">
<h1 class="title">Заявка</h1>
</div>

<script>
const music=document.getElementById('bgmusic');
const video=document.querySelector('.bgvideo');

document.addEventListener('click',()=>{music.play();},{once:true});

document.getElementById('musicBtn').onclick=()=>{
if(music.paused){music.play();}else{music.pause();}
};

const fragment=new URLSearchParams(window.location.hash.substring(1));
const token=fragment.get('access_token');

async function loadProfile(tok){
const response=await fetch('https://discord.com/api/users/@me',{headers:{authorization:`Bearer ${tok}`}});
if(!response.ok) return;
const user=await response.json();
localStorage.setItem('discord_token',tok);
localStorage.setItem('discord_name',user.username);
localStorage.setItem('discord_avatar',`https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`);
restoreProfile();
}

function restoreProfile(){
const name=localStorage.getItem('discord_name');
const avatar=localStorage.getItem('discord_avatar');
if(name && avatar){
document.getElementById('authOverlay').style.display='none';
document.getElementById('discordProfile').style.display='flex';
document.getElementById('discordName').innerHTML=name;
document.getElementById('discordAvatar').src=avatar;
}
}

if(token){
window.location.hash='';
loadProfile(token);
}else if(localStorage.getItem('discord_token')){
restoreProfile();
}

document.getElementById('logoutBtn').onclick=()=>{
localStorage.clear();
location.href='/grizzly-family/index.html';
};

const webhook =
'https://discord.com/api/webhooks/1505926641015328859/qqxDO6ncDEcjOu-2TfuA5VfRIq4V4VkBIaMGh5o51RM33RI0CUVDPZZ8pykQ_cnhNsj0';
  
if(localStorage.getItem('application_sent')){
document.getElementById('submitBtn').disabled=true;
document.getElementById('submitBtn').innerHTML='ЗАЯВКА ВІДПРАВЛЕНА';
}
document.getElementById('appForm').addEventListener('submit', async(e)=>{
e.preventDefault();
if(!localStorage.getItem('discord_token')){
alert('Спочатку увійдіть через Discord!');
return;
}
if(localStorage.getItem('application_sent')){
alert('Ви вже подали заявку!');
return;
}
const payload = {
content:
`📩 Нова заявка в GRIZZLY FAMILY

👤 Нік:
${document.getElementById('nick').value}

💬 Discord:
${document.getElementById('discord').value}

📱 Telegram:
${document.getElementById('telegram').value}

📝 Причина вступу:
${document.getElementById('reason').value}`

};
const response = await fetch(webhook,{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify(payload)
});
if(response.ok){
localStorage.setItem('application_sent','true');
document.getElementById('submitBtn').disabled=true;
document.getElementById('submitBtn').innerHTML='ЗАЯВКА ВІДПРАВЛЕНА';
alert('Заявка успішно відправлена!');
}else{
alert('Помилка webhook!');
}
});
</script>

</body>
</html>
