<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>apply.html</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#050505;
color:white;
padding-top:90px;
}
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:12px;
padding:15px;
background:rgba(0,0,0,.6);
backdrop-filter:blur(10px);
}
nav a{
color:white;
text-decoration:none;
padding:10px 16px;
background:#151515;
border-radius:10px;
}
.container{
padding:30px;
max-width:1200px;
margin:auto;
}
.title{
font-size:48px;
color:#ff004c;
margin-bottom:25px;
}
.card{
background:#121212;
padding:25px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(255,0,76,.15);
}
.infoBox{
background:#1a1a1a;
padding:15px;
border-radius:12px;
margin-top:15px;
}

.bgvideo{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
filter:brightness(.25);
}
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.65);
z-index:-1;
}
#musicBtn{
position:fixed;
bottom:20px;
right:20px;
padding:12px 16px;
border:none;
border-radius:10px;
background:#ff004c;
color:white;
cursor:pointer;
z-index:9999;
}
#discordProfile{
position:fixed;
top:90px;
right:20px;
display:none;
align-items:center;
gap:12px;
background:rgba(20,20,20,.95);
padding:12px;
border-radius:14px;
z-index:9999;
}
#discordAvatar{
width:50px;
height:50px;
border-radius:50%;
border:2px solid #ff004c;
}
#logoutBtn{
padding:8px 12px;
border:none;
border-radius:10px;
background:#ff004c;
color:white;
cursor:pointer;
margin-top:5px;
}
#authOverlay{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:#000;
z-index:10000;
}
.loginBtn{
display:inline-block;
padding:14px 22px;
border-radius:12px;
background:#ff004c;
color:white;
text-decoration:none;
margin-top:20px;
}

</style>

</head>
<body>

<video class="bgvideo" autoplay muted loop>
<source src="/grizzly-family/assets/media/background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<audio id="bgmusic" autoplay loop>
<source src="/grizzly-family/assets/media/music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">MUSIC</button>

<div id="discordProfile">
<img id="discordAvatar">
<div>
<div id="discordName"></div>
<button id="logoutBtn">LOGOUT</button>
</div>
</div>

<div id="authOverlay">
<div style="text-align:center">
<h1 style="color:#ff004c">GRIZZLY FAMILY</h1>
<a class="loginBtn" href="https://discord.com/oauth2/authorize?client_id=1506029366008610856&response_type=token&redirect_uri=https%3A%2F%2Fcrowsk1ck.github.io%2Fgrizzly-family&scope=identify%20email">LOGIN WITH DISCORD</a>
</div>
</div>


<nav>
<a href="/grizzly-family/index.html">Інфо</a>
<a href="/grizzly-family/pages/team.html">Команда</a>
<a href="/grizzly-family/pages/gallery.html">Галерея</a>
<a href="/grizzly-family/pages/contracts.html">Контракти</a>
<a href="/grizzly-family/pages/apply.html">Заявка</a>
</nav>

<div class="container">
<h1 class="title">Заявка</h1>
</div>

<script>
const music=document.getElementById('bgmusic');
const video=document.querySelector('.bgvideo');

document.addEventListener('click',()=>{music.play();},{once:true});

if(localStorage.getItem('music_time')){
music.currentTime=parseFloat(localStorage.getItem('music_time'));
}
if(localStorage.getItem('video_time')){
video.currentTime=parseFloat(localStorage.getItem('video_time'));
}

music.addEventListener('timeupdate',()=>{
localStorage.setItem('music_time',music.currentTime);
});

video.addEventListener('timeupdate',()=>{
localStorage.setItem('video_time',video.currentTime);
});

document.getElementById('musicBtn').onclick=()=>{
if(music.paused){music.play();}else{music.pause();}
};

const fragment=new URLSearchParams(window.location.hash.substring(1));
const token=fragment.get('access_token');

async function loadProfile(tok){
const response=await fetch('https://discord.com/api/users/@me',{
headers:{authorization:`Bearer ${tok}`}
});
if(!response.ok)return;

const user=await response.json();

localStorage.setItem('discord_token',tok);
localStorage.setItem('discord_name',user.username);
localStorage.setItem('discord_avatar',
`https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`);

restoreProfile();
}

function restoreProfile(){
const name=localStorage.getItem('discord_name');
const avatar=localStorage.getItem('discord_avatar');

if(name&&avatar){
document.getElementById('authOverlay').style.display='none';
document.getElementById('discordProfile').style.display='flex';
document.getElementById('discordName').innerHTML=name;
document.getElementById('discordAvatar').src=avatar;
}
}

if(token){
window.location.hash='';
loadProfile(token);
}else if(localStorage.getItem('discord_token')){
restoreProfile();
}

document.getElementById('logoutBtn').onclick=()=>{
localStorage.clear();
location.href='/grizzly-family/index.html';
};
</script>

</body>
</html>
