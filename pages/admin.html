
<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRIZZLY ADMIN PANEL</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,sans-serif;
background:#050505;
color:white;
overflow-x:hidden;
}
.bgvideo{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(.15);
z-index:-2;
}
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
backdrop-filter:blur(4px);
z-index:-1;
}
nav{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:center;
gap:14px;
padding:16px;
background:rgba(0,0,0,.45);
backdrop-filter:blur(14px);
z-index:999;
}
nav a{
padding:11px 18px;
background:#171717;
border-radius:14px;
text-decoration:none;
color:white;
font-weight:700;
}
.wrapper{
max-width:1500px;
margin:auto;
padding:120px 25px 40px;
}
.title{
font-size:58px;
font-weight:900;
color:#ff004c;
margin-bottom:30px;
}
.panel{
background:linear-gradient(180deg,rgba(18,18,18,.96),rgba(10,10,10,.92));
border:1px solid rgba(255,0,76,.18);
border-radius:26px;
padding:24px;
backdrop-filter:blur(14px);
box-shadow:0 0 30px rgba(255,0,76,.12);
margin-bottom:20px;
}
.panelTitle{
font-size:28px;
font-weight:900;
margin-bottom:24px;
color:#ff004c;
}
.input{
width:100%;
padding:16px;
margin-bottom:15px;
background:#111;
border:none;
border-radius:14px;
color:white;
}
.btn{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#ff004c,#ff2f6d);
color:white;
font-weight:900;
cursor:pointer;
margin-bottom:10px;
}
#discordProfile{
position:fixed;
top:90px;
right:20px;
display:none;
align-items:center;
gap:12px;
background:rgba(20,20,20,.95);
padding:12px;
border-radius:14px;
z-index:9999;
}
#discordAvatar{
width:50px;
height:50px;
border-radius:50%;
border:2px solid #ff004c;
}
#logoutBtn{
padding:8px 12px;
border:none;
border-radius:10px;
background:#ff004c;
color:white;
cursor:pointer;
}
</style>
</head>
<body>

<video class="bgvideo" autoplay muted loop>
<source src="/assets/media/background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<nav>
<a href="/index.html">Інфо</a>
<a href="/pages/team.html">Команда</a>
<a href="/pages/gallery.html">Галерея</a>
<a href="/pages/contracts.html">Контракти</a>
</nav>

<div id="discordProfile">
<img id="discordAvatar">
<div>
<div id="discordName"></div>
<button id="logoutBtn">LOGOUT</button>
</div>
</div>

<div class="wrapper">

<div class="title">GRIZZLY ADMIN PANEL</div>

<div id="accessDenied" class="panel">
<div class="panelTitle">ACCESS DENIED</div>
<p>У вас немає доступу до ADMIN PANEL</p>
</div>

<div id="adminPanel" style="display:none">

<div class="panel">

<div class="panelTitle">ADMIN ACCESS</div>

<p style="margin-bottom:20px">
Ви успішно увійшли як ADMIN.
</p>

<button class="btn" onclick="clearPanel()">
ОЧИСТИТИ ПАНЕЛЬ
</button>

</div>

</div>

</div>

<script>

// ВСТАВ СЮДА СВІЙ DISCORD ID
const admins = [
'PUT_YOUR_DISCORD_ID_HERE'
];

function restoreProfile(){

const name =
localStorage.getItem('discord_name');

const avatar =
localStorage.getItem('discord_avatar');

if(name && avatar){

document.getElementById(
'discordProfile'
).style.display='flex';

document.getElementById(
'discordName'
).innerHTML=name;

document.getElementById(
'discordAvatar'
).src=avatar;

}

}

restoreProfile();

const currentUserId =
localStorage.getItem('discord_id');

if(admins.includes(currentUserId)){

document.getElementById(
'adminPanel'
).style.display='block';

document.getElementById(
'accessDenied'
).style.display='none';

}

function clearPanel(){

if(!confirm('Очистити GRIZZLY PANEL?'))
return;

localStorage.removeItem('contracts');
localStorage.removeItem('members');
localStorage.removeItem('total');

alert('PANEL CLEARED');

}

document.getElementById(
'logoutBtn'
).onclick=()=>{

localStorage.clear();

location.href='/index.html';

};

</script>

</body>
</html>
