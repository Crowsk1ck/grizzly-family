
<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRIZZLY ADMIN PANEL</title>

<style>

body{
margin:0;
font-family:Arial;
background:#050505;
color:white;
}

.wrapper{
max-width:1200px;
margin:auto;
padding:40px;
}

.panel{
background:#111;
border-radius:24px;
padding:25px;
border:1px solid rgba(255,0,76,.2);
margin-bottom:20px;
}

.title{
font-size:52px;
font-weight:900;
color:#ff004c;
margin-bottom:25px;
}

.btn{
padding:16px;
width:100%;
border:none;
border-radius:14px;
background:#ff004c;
color:white;
font-weight:900;
cursor:pointer;
margin-top:12px;
}

.input{
width:100%;
padding:16px;
background:#1a1a1a;
border:none;
border-radius:14px;
color:white;
margin-bottom:12px;
}

#adminPanel{
display:none;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="title">
GRIZZLY ADMIN PANEL
</div>

<div id="accessDenied" class="panel">
<h2>ACCESS DENIED</h2>
<p>У вас немає доступу до ADMIN PANEL</p>
</div>

<div id="adminPanel">

<div class="panel">

<h2>ADMIN TOOLS</h2>

<input class="input"
id="contractName"
placeholder="Назва контракту">

<input class="input"
id="contractAmount"
placeholder="Сума">

<button class="btn"
onclick="saveContract()">
ЗБЕРЕГТИ КОНТРАКТ
</button>

<button class="btn"
onclick="clearPanel()">
ОЧИСТИТИ ПАНЕЛЬ
</button>

</div>

</div>

</div>

<script type="module">

import {
auth,
db,
collection,
addDoc,
getDocs,
onAuthStateChanged
} from "/assets/js/firebase.js";

const OWNER_ID =
'511272056021581835';

onAuthStateChanged(auth, async(user)=>{

if(!user){
return;
}

if(user.uid){

document.getElementById(
'adminPanel'
).style.display='block';

document.getElementById(
'accessDenied'
).style.display='none';

}

});

window.saveContract = async()=>{

const title =
document.getElementById(
'contractName'
).value;

const amount =
document.getElementById(
'contractAmount'
).value;

if(!title || !amount){
alert('Заповни поля');
return;
}

await addDoc(
collection(db,'contracts'),
{
title,
amount,
created:Date.now()
}
);

alert('Контракт збережено');

};

window.clearPanel = ()=>{

localStorage.clear();

alert('PANEL CLEARED');

};

</script>

</body>
</html>
