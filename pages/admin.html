<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRIZZLY ADMIN PANEL</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#050505;
color:white;
overflow-x:hidden;
}

.bgvideo{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(.15);
z-index:-2;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
backdrop-filter:blur(4px);
z-index:-1;
}

nav{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:center;
gap:14px;
padding:16px;
background:rgba(0,0,0,.45);
backdrop-filter:blur(14px);
z-index:999;
}

nav a{
padding:11px 18px;
background:#171717;
border-radius:14px;
text-decoration:none;
color:white;
font-weight:700;
transition:.3s;
}

nav a:hover{
background:#ff004c;
}

.wrapper{
max-width:1500px;
margin:auto;
padding:120px 25px 40px;
}

.title{
font-size:58px;
font-weight:900;
color:#ff004c;
margin-bottom:30px;
}

.adminPanel{
display:none;
}

.dashboard{
display:grid;
grid-template-columns:420px 1fr;
gap:22px;
}

.panel{
background:linear-gradient(
180deg,
rgba(18,18,18,.96),
rgba(10,10,10,.92)
);
border:1px solid rgba(255,0,76,.18);
border-radius:26px;
padding:24px;
backdrop-filter:blur(14px);
box-shadow:0 0 30px rgba(255,0,76,.12);
}

.panelTitle{
font-size:28px;
font-weight:900;
margin-bottom:24px;
color:#ff004c;
}

.input{
width:100%;
padding:16px;
margin-bottom:15px;
background:#111;
border:none;
border-radius:14px;
color:white;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#ff004c,#ff2f6d);
color:white;
font-weight:900;
cursor:pointer;
margin-bottom:10px;
}

.btnDanger{
background:#222;
}

.statGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:25px;
}

.stat{
padding:20px;
background:#111;
border-radius:18px;
}

.stat h2{
font-size:34px;
color:#00ff95;
margin-bottom:8px;
}

.table{
margin-top:18px;
border-radius:20px;
overflow:hidden;
}

.row{
display:grid;
grid-template-columns:1fr 180px 180px;
padding:18px;
background:#111;
border-bottom:1px solid rgba(255,255,255,.04);
}

.rowHeader{
background:#171717;
font-weight:900;
color:#ff004c;
}

.green{
color:#00ff95;
font-weight:900;
}

#discordProfile{
position:fixed;
top:90px;
right:20px;
display:none;
align-items:center;
gap:12px;
background:rgba(20,20,20,.95);
padding:12px;
border-radius:14px;
z-index:9999;
border:1px solid rgba(255,0,76,.18);
}

#discordAvatar{
width:50px;
height:50px;
border-radius:50%;
border:2px solid #ff004c;
}

#logoutBtn{
padding:8px 12px;
border:none;
border-radius:10px;
background:#ff004c;
color:white;
cursor:pointer;
margin-top:5px;
}

#accessDenied{
display:none;
}

</style>
</head>

<body>

<video class="bgvideo" autoplay muted loop>
<source src="/assets/media/background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<nav>
<a href="/index.html">Головна</a>
<a href="/pages/team.html">Команда</a>
<a href="/pages/gallery.html">Галерея</a>
<a href="/pages/contracts.html">Контракти</a>
</nav>

<div id="discordProfile">
<img id="discordAvatar">
<div>
<div id="discordName"></div>
<button id="logoutBtn">LOGOUT</button>
</div>
</div>

<div class="wrapper">

<div class="title">
GRIZZLY ADMIN PANEL
</div>

<div id="accessDenied" class="panel">

<div class="panelTitle">
ACCESS DENIED
</div>

<p>
У вас немає доступу до ADMIN PANEL
</p>

</div>

<div id="adminPanel" class="adminPanel">

<div class="dashboard">

<div class="panel">

<div class="panelTitle">
ADMIN TOOLS
</div>

<input class="input" id="contractName"
placeholder="Назва контракту">

<input class="input" id="contractAmount"
placeholder="Сума">

<input class="input" id="contractMembers"
placeholder="Учасники через кому">

<button class="btn"
onclick="addContract()">
ДОДАТИ КОНТРАКТ
</button>

<button class="btn btnDanger"
onclick="clearPanel()">
ОЧИСТИТИ ПАНЕЛЬ
</button>

</div>

<div>

<div class="panel">

<div class="panelTitle">
СТАТИСТИКА
</div>

<div class="statGrid">

<div class="stat">
<h2 id="contractsCount">0</h2>
<p>КОНТРАКТІВ</p>
</div>

<div class="stat">
<h2 id="membersCount">0</h2>
<p>СЕРЕДНЯ КІЛЬКІСТЬ УЧАСНИКІВ</p>
</div>

<div class="stat">
<h2 id="totalIncome">$0</h2>
<p>ЗАГАЛЬНИЙ ДОХІД</p>
</div>

<div class="stat">
<h2 id="netIncome">$0</h2>
<p>ЧИСТИЙ ДОХІД</p>
</div>

</div>

<div class="table">

<div class="row rowHeader">
<div>КОНТРАКТ</div>
<div>УЧАСНИКИ</div>
<div>ДОХІД</div>
</div>

<div id="contractsTable"></div>

</div>

</div>

</div>

</div>

</div>

<script>

// ВСТАВ СЮДА СВОЙ DISCORD ID
const admins = [
'PUT_YOUR_DISCORD_ID_HERE'
];

const token =
new URLSearchParams(
window.location.hash.substring(1)
).get('access_token');

async function loadProfile(tok){

const response =
await fetch(
'https://discord.com/api/users/@me',
{
headers:{
authorization:`Bearer ${tok}`
}
}
);

if(!response.ok) return;

const user = await response.json();

localStorage.setItem(
'discord_token',
tok
);

localStorage.setItem(
'discord_id',
user.id
);

localStorage.setItem(
'discord_name',
user.username
);

localStorage.setItem(
'discord_avatar',
`https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
);

restoreProfile();

checkAdmin();

}

function restoreProfile(){

const name =
localStorage.getItem('discord_name');

const avatar =
localStorage.getItem('discord_avatar');

if(name && avatar){

document.getElementById(
'discordProfile'
).style.display='flex';

document.getElementById(
'discordName'
).innerHTML=name;

document.getElementById(
'discordAvatar'
).src=avatar;

}

}

function checkAdmin(){

const currentUserId =
localStorage.getItem('discord_id');

if(admins.includes(currentUserId)){

document.getElementById(
'adminPanel'
).style.display='block';

document.getElementById(
'accessDenied'
).style.display='none';

}else{

document.getElementById(
'accessDenied'
).style.display='block';

}

}

if(token){

window.location.hash='';

loadProfile(token);

}else{

restoreProfile();
checkAdmin();

}

function updateStats(){

let contracts =
parseInt(localStorage.getItem('contracts') || 0);

let members =
parseInt(localStorage.getItem('members') || 0);

let total =
parseInt(localStorage.getItem('total') || 0);

let average =
contracts > 0
? Math.floor(members / contracts)
: 0;

document.getElementById(
'contractsCount'
).innerText = contracts;

document.getElementById(
'membersCount'
).innerText = average;

document.getElementById(
'totalIncome'
).innerText =
'$' + total.toLocaleString();

document.getElementById(
'netIncome'
).innerText =
'$' + Math.floor(total * 0.84)
.toLocaleString();

}

updateStats();

function addContract(){

const title =
document.getElementById(
'contractName'
).value;

const amount =
document.getElementById(
'contractAmount'
).value;

const members =
document.getElementById(
'contractMembers'
).value;

if(!title || !amount || !members){

alert('Заповни всі поля');
return;

}

let contracts =
parseInt(localStorage.getItem('contracts') || 0);

let totalMembers =
parseInt(localStorage.getItem('members') || 0);

let total =
parseInt(localStorage.getItem('total') || 0);

contracts += 1;

const currentMembers =
members
.split(',')
.filter(x=>x.trim()!=='')
.length;

totalMembers += currentMembers;

total += parseInt(amount) || 0;

localStorage.setItem(
'contracts',
contracts
);

localStorage.setItem(
'members',
totalMembers
);

localStorage.setItem(
'total',
total
);

document.getElementById(
'contractsTable'
).innerHTML += `

<div class="row">
<div>${title}</div>
<div>${currentMembers}</div>
<div class="green">$${amount}</div>
</div>

`;

updateStats();

alert('Контракт додано');

}

function clearPanel(){

if(!confirm('Очистити GRIZZLY PANEL?'))
return;

localStorage.removeItem('contracts');
localStorage.removeItem('members');
localStorage.removeItem('total');

document.getElementById(
'contractsTable'
).innerHTML='';

updateStats();

alert('PANEL CLEARED');

}

document.getElementById(
'logoutBtn'
).onclick=()=>{

localStorage.clear();

location.href='/index.html';

};

</script>

</body>
</html>
