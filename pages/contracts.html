<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRIZZLY PANEL</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#050505;
color:white;
overflow-x:hidden;
}

.bgvideo{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(.15);
z-index:-2;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
z-index:-1;
}

nav{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:center;
gap:12px;
padding:15px;
background:rgba(0,0,0,.6);
backdrop-filter:blur(10px);
z-index:999;
}

nav a{
color:white;
text-decoration:none;
padding:10px 16px;
background:#151515;
border-radius:10px;
}

.wrapper{
max-width:1500px;
margin:auto;
padding:120px 25px 40px;
}

.title{
font-size:58px;
font-weight:900;
color:#ff004c;
margin-bottom:30px;
}

.dashboard{
display:grid;
grid-template-columns:420px 1fr;
gap:22px;
}

.panel{
background:#121212;
padding:24px;
border-radius:24px;
border:1px solid rgba(255,0,76,.15);
}

.panelTitle{
font-size:28px;
font-weight:900;
color:#ff004c;
margin-bottom:24px;
}

.input{
width:100%;
padding:16px;
margin-bottom:15px;
background:#1a1a1a;
border:none;
border-radius:14px;
color:white;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#ff004c;
color:white;
font-weight:900;
cursor:pointer;
margin-top:10px;
}

.statGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:25px;
}

.stat{
padding:20px;
background:#111;
border-radius:18px;
}

.stat h2{
font-size:34px;
color:#00ff95;
margin-bottom:8px;
}

.table{
margin-top:18px;
border-radius:20px;
overflow:hidden;
}

.row{
display:grid;
grid-template-columns:1fr 180px 180px;
padding:18px;
background:#111;
border-bottom:1px solid rgba(255,255,255,.04);
}

.rowHeader{
background:#171717;
font-weight:900;
color:#ff004c;
}

.green{
color:#00ff95;
font-weight:900;
}

#discordProfile{
position:fixed;
top:90px;
right:20px;
display:flex;
align-items:center;
gap:12px;
background:rgba(20,20,20,.95);
padding:12px;
border-radius:14px;
z-index:9999;
}

#discordAvatar{
width:50px;
height:50px;
border-radius:50%;
border:2px solid #ff004c;
}

#logoutBtn{
padding:8px 12px;
border:none;
border-radius:10px;
background:#ff004c;
color:white;
cursor:pointer;
}

#musicBtn{
position:fixed;
bottom:20px;
right:20px;
padding:12px 16px;
border:none;
border-radius:10px;
background:#ff004c;
color:white;
cursor:pointer;
z-index:9999;
}

</style>
</head>

<body>

<video class="bgvideo" autoplay muted loop>
<source src="/assets/media/background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<audio id="bgmusic" autoplay loop>
<source src="/assets/media/music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">MUSIC</button>

<div id="discordProfile">
<img id="discordAvatar"
src="https://cdn.discordapp.com/embed/avatars/0.png">
<div>
<div id="discordName">GRIZZLY USER</div>
<button id="logoutBtn">LOGOUT</button>
</div>
</div>

<nav>
<a href="/index.html">Інфо</a>
<a href="/pages/team.html">Команда</a>
<a href="/pages/gallery.html">Галерея</a>
<a href="/pages/contracts.html">Контракти</a>
<a href="/pages/apply.html">Заявка</a>
</nav>

<div class="wrapper">

<div class="title">GRIZZLY PANEL</div>

<div class="dashboard">

<div class="panel">

<div class="panelTitle">
ДОДАТИ КОНТРАКТ
</div>

<input class="input" id="title"
placeholder="Назва контракту">

<input class="input" id="amount"
placeholder="Сума">

<input class="input" id="members"
placeholder="Учасники через кому">

<button class="btn"
onclick="sendContract()">
ДОДАТИ КОНТРАКТ
</button>

<button class="btn"
style="background:#222"
onclick="clearPanel()">
ОЧИСТИТИ ПАНЕЛЬ
</button>

</div>

<div class="panel">

<div class="panelTitle">
СТАТИСТИКА
</div>

<div class="statGrid">

<div class="stat">
<h2 id="contractsCount">0</h2>
<p>КОНТРАКТІВ</p>
</div>

<div class="stat">
<h2 id="membersCount">0</h2>
<p>СЕРЕДНЯ КІЛЬКІСТЬ УЧАСНИКІВ</p>
</div>

<div class="stat">
<h2 id="totalIncome">$0</h2>
<p>ЗАГАЛЬНИЙ ДОХІД</p>
</div>

<div class="stat">
<h2 id="netIncome">$0</h2>
<p>ЧИСТИЙ ДОХІД</p>
</div>

</div>

<div class="table">

<div class="row rowHeader">
<div>КОНТРАКТ</div>
<div>УЧАСНИКИ</div>
<div>ДОХІД</div>
</div>

<div id="contractsTable"></div>

</div>

</div>

</div>

</div>

<script>

const music =
document.getElementById('bgmusic');

document.getElementById(
'musicBtn'
).onclick=()=>{

if(music.paused){
music.play();
}else{
music.pause();
}

};

function updateStats(){

let contracts =
JSON.parse(
localStorage.getItem('contractsData') || '[]'
);

let totalContracts =
contracts.length;

let totalIncome = 0;
let totalMembers = 0;

document.getElementById(
'contractsTable'
).innerHTML='';

contracts.forEach((c)=>{

totalIncome += Number(c.amount);
totalMembers += Number(c.membersCount);

document.getElementById(
'contractsTable'
).innerHTML += `

<div class="row">
<div>${c.title}</div>
<div>${c.membersCount}</div>
<div class="green">$${c.amount}</div>
</div>

`;

});

let average =
totalContracts > 0
? Math.floor(totalMembers / totalContracts)
: 0;

document.getElementById(
'contractsCount'
).innerText =
totalContracts;

document.getElementById(
'membersCount'
).innerText =
average;

document.getElementById(
'totalIncome'
).innerText =
'$' + totalIncome.toLocaleString();

document.getElementById(
'netIncome'
).innerText =
'$' + Math.floor(totalIncome * 0.84).toLocaleString();

}

updateStats();

window.sendContract = ()=>{

const title =
document.getElementById('title').value;

const amount =
document.getElementById('amount').value;

const members =
document.getElementById('members').value;

if(!title || !amount || !members){

alert('Заповни всі поля');
return;

}

let contracts =
JSON.parse(
localStorage.getItem('contractsData') || '[]'
);

let membersCount =
members
.split(',')
.filter(x=>x.trim()!=='')
.length;

contracts.push({

title:title,
amount:Number(amount.replace(/\D/g,'')),
membersCount:membersCount

});

localStorage.setItem(
'contractsData',
JSON.stringify(contracts)
);

updateStats();

alert('Контракт додано');

};

window.clearPanel = ()=>{

const password =
prompt('Введи пароль');

if(password !== 'grizzlyadmin'){

alert('Невірний пароль');
return;

}

localStorage.removeItem(
'contractsData'
);

updateStats();

alert('GRIZZLY PANEL очищено');

};

function restoreProfile(){

const name =
localStorage.getItem('discord_name');

const avatar =
localStorage.getItem('discord_avatar');

if(name){

document.getElementById(
'discordName'
).innerHTML=name;

}

if(avatar){

document.getElementById(
'discordAvatar'
).src=avatar;

}

}

restoreProfile();

document.getElementById(
'logoutBtn'
).onclick=()=>{

localStorage.clear();

location.href='/index.html';

};

</script>

</body>
</html>
