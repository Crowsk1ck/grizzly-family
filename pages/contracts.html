<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Контракти</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#000;
color:white;
padding-top:80px;
overflow-x:hidden;
}

.bgvideo{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
filter:brightness(.25);
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.65);
z-index:-1;
}

nav{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
gap:10px;
padding:15px;
background:rgba(0,0,0,.55);
backdrop-filter:blur(10px);
overflow-x:auto;
z-index:999;
}

nav a{
color:white;
text-decoration:none;
padding:10px 14px;
background:#1b1b1b;
border-radius:10px;
white-space:nowrap;
}

.container{
padding:30px;
}

.title{
font-size:48px;
color:#ff004c;
}

#musicBtn{
position:fixed;
bottom:20px;
right:20px;
padding:12px 16px;
border:none;
border-radius:10px;
background:#ff004c;
color:white;
cursor:pointer;
z-index:9999;
}
</style>

</head>
<body>


<video class="bgvideo" autoplay muted loop>
<source src="/grizzly-family/assets/media/background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<audio id="bgmusic" autoplay loop>
<source src="/grizzly-family/assets/media/music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">MUSIC</button>

<script>
const music=document.getElementById('bgmusic');
const video=document.querySelector('.bgvideo');

if(localStorage.getItem('music_time')){
music.currentTime=parseFloat(localStorage.getItem('music_time'));
}

if(localStorage.getItem('video_time')){
video.currentTime=parseFloat(localStorage.getItem('video_time'));
}

document.addEventListener('click',()=>{
music.play();
},{once:true});

music.addEventListener('timeupdate',()=>{
localStorage.setItem('music_time',music.currentTime);
});

video.addEventListener('timeupdate',()=>{
localStorage.setItem('video_time',video.currentTime);
});

document.getElementById('musicBtn').onclick=()=>{
if(music.paused){
music.play();
}else{
music.pause();
}
};
</script>


<nav>
<a href="/grizzly-family/index.html">Інфо</a>
<a href="/grizzly-family/pages/team.html">Команда</a>
<a href="/grizzly-family/pages/gallery.html">Галерея</a>
<a href="/grizzly-family/pages/contracts.html">Контракти</a>
<a href="/grizzly-family/pages/apply.html">Заявка</a>
</nav>

<div class="container">
<h1 class="title">Контракти</h1>
</div>

</body>
</html>
