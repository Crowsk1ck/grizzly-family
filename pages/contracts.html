
<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRIZZLY PANEL</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial,sans-serif;
background:#050505;
color:white;
overflow-x:hidden;
}

.bgvideo{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(.15);
z-index:-2;
}

.overlay{
position:fixed;
inset:0;
background:linear-gradient(
90deg,
rgba(0,0,0,.92),
rgba(0,0,0,.72),
rgba(0,0,0,.92)
);
backdrop-filter:blur(4px);
z-index:-1;
}

nav{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:center;
gap:14px;
padding:16px;
background:rgba(0,0,0,.45);
backdrop-filter:blur(14px);
z-index:999;
}

nav a{
padding:11px 18px;
background:#171717;
border-radius:14px;
text-decoration:none;
color:white;
font-weight:700;
transition:.3s;
}

nav a:hover{
background:#ff004c;
transform:translateY(-2px);
}

.wrapper{
max-width:1600px;
margin:auto;
padding:120px 25px 40px;
}

.title{
font-size:58px;
font-weight:900;
color:#ff004c;
margin-bottom:30px;
}

.dashboard{
display:grid;
grid-template-columns:420px 1fr;
gap:22px;
align-items:start;
}

.panel{
background:linear-gradient(
180deg,
rgba(18,18,18,.96),
rgba(10,10,10,.92)
);
border:1px solid rgba(255,0,76,.18);
border-radius:26px;
padding:24px;
backdrop-filter:blur(14px);
box-shadow:0 0 30px rgba(255,0,76,.12);
}

.panelTitle{
font-size:28px;
font-weight:900;
margin-bottom:24px;
color:#ff004c;
}

.input{
width:100%;
padding:16px;
margin-bottom:15px;
background:#111;
border:none;
border-radius:14px;
color:white;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#ff004c,#ff2f6d);
color:white;
font-weight:900;
cursor:pointer;
}

.statGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:25px;
}

.stat{
padding:20px;
background:#111;
border-radius:18px;
}

.stat h2{
font-size:34px;
color:#00ff95;
margin-bottom:8px;
}

.table{
margin-top:18px;
border-radius:20px;
overflow:hidden;
}

.row{
display:grid;
grid-template-columns:1fr 180px 180px;
padding:18px;
background:#111;
border-bottom:1px solid rgba(255,255,255,.04);
}

.rowHeader{
background:#171717;
font-weight:900;
color:#ff004c;
}

.green{
color:#00ff95;
font-weight:900;
}

.history{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:18px;
margin-top:20px;
}

.historyCard{
padding:22px;
border-radius:22px;
background:#111;
}

.historyCard h3{
font-size:22px;
margin-bottom:12px;
color:#ff004c;
}

#musicBtn{
position:fixed;
bottom:20px;
right:20px;
padding:13px 18px;
border:none;
border-radius:14px;
background:#ff004c;
color:white;
font-weight:800;
cursor:pointer;
z-index:999;
}

@media(max-width:1200px){
.dashboard{grid-template-columns:1fr;}
}

#discordProfile{
position:fixed;
top:90px;
right:20px;
display:none;
align-items:center;
gap:12px;
background:rgba(20,20,20,.95);
padding:12px;
border-radius:14px;
z-index:9999;
border:1px solid rgba(255,0,76,.18);
}

#discordAvatar{
width:50px;
height:50px;
border-radius:50%;
border:2px solid #ff004c;
}

#logoutBtn{
padding:8px 12px;
border:none;
border-radius:10px;
background:#ff004c;
color:white;
cursor:pointer;
margin-top:5px;
}

</style>
</head>

<body>

<video class="bgvideo" autoplay muted loop>
<source src="/assets/media/background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<audio id="bgmusic" autoplay loop>
<source src="/assets/media/music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">MUSIC</button>

<div id="discordProfile">
<img id="discordAvatar">
<div>
<div id="discordName"></div>
<button id="logoutBtn">LOGOUT</button>
</div>
</div>


<nav>
<a href="/index.html">Інфо</a>
<a href="/pages/team.html">Команда</a>
<a href="/pages/gallery.html">Галерея</a>
<a href="/pages/contracts.html">Контракти</a>
<a href="/pages/apply.html">Заявка</a>
</nav>

<div class="wrapper">

<div class="title">GRIZZLY PANEL</div>

<div class="dashboard">

<div class="panel">

<div class="panelTitle">ДОДАТИ КОНТРАКТ</div>

<input class="input" placeholder="Назва контракту">
<input class="input" placeholder="Сума">
<input class="input" placeholder="Учасники">

<button class="btn" onclick="sendContract()">ДОДАТИ КОНТРАКТ</button>

</div>

<div>

<div class="panel">

<div class="panelTitle">СТАТИСТИКА</div>


<div class="statGrid">

<div class="stat">
<h2 id="contractsCount">0</h2>
<p>КОНТРАКТІВ</p>
</div>

<div class="stat">
<h2 id="membersCount">0</h2>
<p>СЕРЕДНЯ КІЛЬКІСТЬ УЧАСНИКІВ</p>
</div>

<div class="stat">
<h2 id="totalIncome">$0</h2>
<p>ЗАГАЛЬНИЙ ДОХІД</p>
</div>

<div class="stat">
<h2 id="netIncome">$0</h2>
<p>ЧИСТИЙ ДОХІД</p>
</div>

</div>

<div class="table">


<div class="row rowHeader">
<div>ГРАВЕЦЬ</div>
<div>КОНТРАКТИ</div>
<div>ДОХІД</div>
</div>

<div id="contractsTable"></div>

</div>

</div>

<div class="history">

<div class="historyCard">
<h3>ЛІНІЯ РЕМОНТУ</h3>
<p>👤 Maryana Grizzly</p>
<br>
<p class="green">$120000</p>
</div>

<div class="historyCard">
<h3>ДОСТАВКА OG KUSH</h3>
<p>👤 Zim Neffiltrovanuyi</p>
<br>
<p class="green">$260000</p>
</div>

</div>

</div>

</div>

</div>

<script>

window.onload=()=>{

let savedContracts =
parseInt(localStorage.getItem('contracts')) || 0;

let savedMembers =
parseInt(localStorage.getItem('members')) || 0;

let savedTotal =
parseInt(localStorage.getItem('total')) || 0;

let averageMembers =
savedContracts > 0
? Math.floor(savedMembers / savedContracts)
: 0;

document.getElementById('contractsCount').innerText =
savedContracts;

document.getElementById('membersCount').innerText =
averageMembers;

document.getElementById('totalIncome').innerText =
'$' + savedTotal.toLocaleString();

document.getElementById('netIncome').innerText =
'$' + Math.floor(savedTotal * 0.84).toLocaleString();

};


const music=document.getElementById('bgmusic');

document.addEventListener('click',()=>{
music.play();
},{once:true});

if(localStorage.getItem('music_time')){
music.currentTime=parseFloat(localStorage.getItem('music_time'));
}

music.addEventListener('timeupdate',()=>{
localStorage.setItem('music_time',music.currentTime);
});

document.getElementById('musicBtn').onclick=()=>{
if(music.paused){music.play();}
else{music.pause();}
};

async function sendContract(){

const title =
document.querySelectorAll('.input')[0].value;

const amount =
document.querySelectorAll('.input')[1].value;

const members =
document.querySelectorAll('.input')[2].value;

if(!title || !amount || !members){

alert('Заповни всі поля');

return;

}

const payload = {

embeds:[{

title:'📄 НОВИЙ КОНТРАКТ',

color:0xff004c,

fields:[

{
name:'📌 Назва',
value:title,
inline:false
},

{
name:'💰 Сума',
value:amount,
inline:true
},

{
name:'👥 Учасники',
value:members,
inline:true
}

],

footer:{
text:'GRIZZLY FAMILY PANEL'
},

timestamp:new Date()

}]

};

await fetch(
'https://discord.com/api/webhooks/1506424883737788619/yATAISypU22ZWVvhRKMsSeSZT1l7bghWRvPSoLaERM8tdj1Wx70JXq4QU2DjYwiHC72F',
{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify(payload)
}
);


let contracts =
parseInt(localStorage.getItem('contracts') || 0);

let membersCountTotal =
parseInt(localStorage.getItem('members') || 0);

let total =
parseInt(localStorage.getItem('total') || 0);

contracts += 1;

let currentMembers =
members
.split(',')
.filter(x=>x.trim()!=='')
.length;

membersCountTotal += currentMembers;

total += parseInt(amount.replace(/\D/g,'')) || 0;

let net = Math.floor(total * 0.84);

localStorage.setItem('contracts',contracts);
localStorage.setItem('members',membersCountTotal);
localStorage.setItem('total',total);

let averageMembers =
contracts > 0
? Math.floor(membersCountTotal / contracts)
: 0;

document.getElementById('contractsCount').innerText =
contracts;

document.getElementById('membersCount').innerText =
averageMembers;

document.getElementById('totalIncome').innerText =
'$' + total.toLocaleString();

document.getElementById('netIncome').innerText =
'$' + net.toLocaleString();

document.getElementById('contractsTable').innerHTML += `

<div class="row">
<div>${title}</div>
<div>${currentMembers}</div>
<div class="green">$${amount}</div>
</div>

`;

alert('Контракт відправлено в Discord');


}


function clearPanel(){

const password =
prompt('Введи пароль');

if(password !== 'grizzlyadmin'){

alert('Невірний пароль');

return;

}

if(!confirm('Очистити весь GRIZZLY PANEL?'))
return;

localStorage.removeItem('contracts');
localStorage.removeItem('members');
localStorage.removeItem('total');

document.getElementById(
'contractsCount'
).innerText = 0;

document.getElementById(
'membersCount'
).innerText = 0;

document.getElementById(
'totalIncome'
).innerText = '$0';

document.getElementById(
'netIncome'
).innerText = '$0';

document.getElementById(
'contractsTable'
).innerHTML = '';

alert('GRIZZLY PANEL очищено');

}


function restoreProfile(){

const name =
localStorage.getItem('discord_name');

const avatar =
localStorage.getItem('discord_avatar');

if(name && avatar){

document.getElementById(
'discordProfile'
).style.display='flex';

document.getElementById(
'discordName'
).innerHTML=name;

document.getElementById(
'discordAvatar'
).src=avatar;

}

}

restoreProfile();

document.getElementById (
'logoutBtn'
).onclick=()=>{

localStorage.removeItem('discord_token');
localStorage.removeItem('discord_name');
localStorage.removeItem('discord_avatar');

location.href='/index.html';

};

</script>

</body>
</html>
