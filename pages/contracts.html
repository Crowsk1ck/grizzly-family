<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GRIZZLY PANEL</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#050505;
color:white;
overflow-x:hidden;
padding:40px;
}

.wrapper{
max-width:1700px;
margin:auto;
}

.title{
font-size:58px;
font-weight:900;
color:#ff004c;
margin-bottom:30px;
}

.dashboard{
display:grid;
grid-template-columns:420px 1fr;
gap:22px;
}

.panel{
background:#121212;
padding:24px;
border-radius:24px;
border:1px solid rgba(255,0,76,.15);
box-shadow:0 0 20px rgba(255,0,76,.08);
}

.panelTitle{
font-size:30px;
font-weight:900;
color:#ff004c;
margin-bottom:24px;
}

.input{
width:100%;
padding:16px;
margin-bottom:15px;
background:#1a1a1a;
border:none;
border-radius:14px;
color:white;
font-size:15px;
outline:none;
}

.input::placeholder{
color:#777;
}

.double{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.infoBlock{
background:#151515;
border:1px solid rgba(255,0,76,.15);
padding:16px;
border-radius:14px;
margin-bottom:20px;
font-size:14px;
color:#888;
line-height:1.8;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#ff004c;
color:white;
font-weight:900;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

.btnDark{
background:#222;
}

.statGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:25px;
}

.stat{
padding:20px;
background:#111;
border-radius:18px;
}

.stat h2{
font-size:34px;
color:#00ff95;
margin-bottom:8px;
}

.stat p{
font-size:13px;
color:#aaa;
line-height:1.5;
}

.table{
margin-top:18px;
border-radius:20px;
overflow:hidden;
}

.row{
display:grid;
grid-template-columns:1fr 180px 180px;
padding:18px;
background:#111;
border-bottom:1px solid rgba(255,255,255,.04);
align-items:center;
}

.rowHeader{
background:#171717;
font-weight:900;
color:#ff004c;
}

.green{
color:#00ff95;
font-weight:900;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="title">
GRIZZLY PANEL
</div>

<div class="dashboard">

<!-- LEFT -->

<div class="panel">

<div class="panelTitle">
ДОДАТИ КОНТРАКТ
</div>

<input class="input"
id="title"
placeholder="📄 Назва контракту">

<div class="double">

<input class="input"
id="amount"
placeholder="💰 Сума">

<input class="input"
id="startedBy"
placeholder="👑 Хто почав контракт">

</div>

<input class="input"
id="members"
list="playersList"
placeholder="👥 Учасники через крапку">

<div class="infoBlock">

Учасників розділяй крапкою.

<br>

Почни вводити ім’я вище —
список гравців підтягнеться
з довідника за алфавітом.

</div>

<button class="btn"
onclick="sendContract()">
ДОДАТИ КОНТРАКТ
</button>

<button class="btn btnDark"
onclick="clearPanel()">
ОЧИСТИТИ ПАНЕЛЬ
</button>

</div>

<!-- RIGHT -->

<div class="panel">

<div class="panelTitle">
СТАТИСТИКА
</div>

<div class="statGrid">

<div class="stat">
<h2 id="contractsCount">0</h2>
<p>КОНТРАКТІВ</p>
</div>

<div class="stat">
<h2 id="membersCount">0</h2>
<p>СЕРЕДНЯ КІЛЬКІСТЬ УЧАСНИКІВ</p>
</div>

<div class="stat">
<h2 id="totalIncome">$0</h2>
<p>ЗАГАЛЬНИЙ ДОХІД</p>
</div>

<div class="stat">
<h2 id="netIncome">$0</h2>
<p>ЧИСТИЙ ДОХІД</p>
</div>

</div>

<div class="table">

<div class="row rowHeader">

<div>
КОНТРАКТ
</div>

<div>
УЧАСНИКИ
</div>

<div>
ДОХІД
</div>

</div>

<div id="contractsTable"></div>

</div>

</div>

</div>

</div>

<datalist id="playersList">

<option value="Maryana Volodymyrivna">
<option value="Zim Neffiltrovanuyi">
<option value="Andrew Grizzly">
<option value="Black Wolf">
<option value="Grizzly Family">

</datalist>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="/assets/js/firebase-config.js"></script>

<script>

async function updateFirebaseContracts(){

const currentMonth =
new Date().getMonth();

const currentYear =
new Date().getFullYear();

const snapshot = await db
.collection('contracts')
.where('month','==',currentMonth)
.where('year','==',currentYear)
.orderBy('created','desc')
.get();

let contracts = 0;
let membersTotal = 0;
let totalIncome = 0;

document.getElementById(
'contractsTable'
).innerHTML='';

snapshot.forEach((doc)=>{

const data = doc.data();

contracts++;

membersTotal += Number(data.membersCount || 0);

totalIncome += Number(data.amount || 0);

document.getElementById(
'contractsTable'
).innerHTML += `

<div class="row">

<div>

${data.title}

<br><br>

<span style="
color:#999;
font-size:14px;
line-height:1.7;
">

👑 ${data.startedBy}

<br>

👥 ${data.members}

</span>

</div>

<div>
${data.membersCount}
</div>

<div class="green">
$${data.amount}
</div>

</div>

`;

});

const average =
contracts > 0
? Math.floor(membersTotal / contracts)
: 0;

document.getElementById(
'contractsCount'
).innerText = contracts;

document.getElementById(
'membersCount'
).innerText = average;

document.getElementById(
'totalIncome'
).innerText =
'$' + totalIncome.toLocaleString();

document.getElementById(
'netIncome'
).innerText =
'$' + Math.floor(totalIncome * 0.84).toLocaleString();

}

window.sendContract = async()=>{

const title =
document.getElementById('title').value;

const amount =
document.getElementById('amount').value;

const members =
document.getElementById('members').value;

const startedBy =
document.getElementById('startedBy').value;

if(!title || !amount || !members || !startedBy){

alert('Заповни всі поля');
return;

}

const membersCount =
members
.split('.')
.filter(x=>x.trim()!=='')
.length;

await db.collection('contracts').add({

title:title,
amount:Number(amount.replace(/\D/g,'')),
members:members,
startedBy:startedBy,
membersCount:membersCount,

created:Date.now(),

month:new Date().getMonth(),
year:new Date().getFullYear()

});

alert('Контракт додано');

updateFirebaseContracts();

};

window.clearPanel = async()=>{

const password =
prompt('Введи пароль');

if(password !== 'grizzlyadmin'){
alert('Невірний пароль');
return;
}

const snapshot =
await db.collection('contracts').get();

const promises = [];

snapshot.forEach((doc)=>{
promises.push(doc.ref.delete());
});

await Promise.all(promises);

updateFirebaseContracts();

};

updateFirebaseContracts();

</script>

</body>
</html>
