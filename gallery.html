<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Галерея</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:Arial,sans-serif;
background:#050505;
color:white;
padding-top:100px;
}
nav{
position:fixed;
top:0;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.4);
backdrop-filter:blur(10px);
z-index:999;
}
.logo{font-size:28px;font-weight:bold;color:#ff004c;}
.menu{display:flex;gap:20px;flex-wrap:wrap;}
.menu a{
text-decoration:none;
color:white;
padding:10px 18px;
border-radius:12px;
background:rgba(255,255,255,.05);
}
.menu a:hover{background:#ff004c;}
.container{padding:40px 10%;}
.title{font-size:48px;color:#ff004c;margin-bottom:30px;}
.card{
background:#111;
padding:30px;
border-radius:20px;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}
.member{
background:#101010;
padding:25px;
border-radius:18px;
}
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}
.gallery img{width:100%;border-radius:18px;}
input,textarea{
width:100%;
padding:16px;
margin-top:15px;
border:none;
border-radius:12px;
background:#1a1a1a;
color:white;
}
button{
margin-top:15px;
padding:16px;
width:100%;
border:none;
border-radius:12px;
background:#ff004c;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>
</head><body>
<nav>
<div class="logo">GRIZZLY</div>
<div class="menu">
<a href="index.html">Інфо</a>
<a href="team.html">Команда</a>
<a href="gallery.html">Галерея</a>
<a href="contracts.html">Контракти</a>
<a href="apply.html">Заявка</a>
</div>
</nav>
<div class="container"><h1 class="title">Галерея</h1><div class="gallery"><img src="gallery1.jpg"><img src="gallery2.jpg"><img src="gallery3.jpg"></div></div></body></html>
