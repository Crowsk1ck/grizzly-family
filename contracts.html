<!DOCTYPE html><html><head><title>Grizzly</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#050505;color:white;padding-top:110px;overflow-x:hidden;}
video{position:fixed;right:0;bottom:0;min-width:100%;min-height:100%;object-fit:cover;z-index:-2;filter:brightness(.25);}
.overlay{position:fixed;inset:0;background:linear-gradient(to bottom, rgba(0,0,0,.65), rgba(0,0,0,.92));z-index:-1;}
nav{position:fixed;top:0;width:100%;padding:20px 8%;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.45);backdrop-filter:blur(10px);z-index:999;}
.logo{font-size:28px;font-weight:bold;color:#ff004c;}
.menu{display:flex;gap:18px;flex-wrap:wrap;}
.menu a{text-decoration:none;color:white;padding:10px 18px;border-radius:12px;background:rgba(255,255,255,.05);}
.menu a:hover{background:#ff004c;}
.container{padding:40px 10%;}
.title{font-size:48px;color:#ff004c;margin-bottom:30px;}
.card{background:rgba(17,17,17,.88);padding:30px;border-radius:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.member{background:#101010;padding:25px;border-radius:18px;}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;}
.gallery img{width:100%;border-radius:18px;}
input,textarea{width:100%;padding:16px;margin-top:15px;border:none;border-radius:12px;background:#1a1a1a;color:white;}
button{margin-top:15px;padding:16px;width:100%;border:none;border-radius:12px;background:#ff004c;color:white;font-weight:bold;cursor:pointer;}
#musicBtn{position:fixed;bottom:20px;right:20px;padding:14px 20px;border:none;border-radius:12px;background:#ff004c;color:white;cursor:pointer;z-index:9999;width:auto;}
#discordProfileBox{position:fixed;top:90px;right:20px;display:none;align-items:center;gap:12px;background:rgba(15,15,15,.92);padding:12px 18px;border-radius:16px;z-index:9999;}
#discordAvatarTop{width:55px;height:55px;border-radius:50%;border:2px solid #ff004c;}
#logoutBtn{margin-top:8px;padding:8px 12px;border:none;border-radius:10px;background:#ff004c;color:white;cursor:pointer;width:auto;}
#authOverlay{position:fixed;inset:0;background:#000;display:flex;justify-content:center;align-items:center;z-index:10000;}
.authBox{text-align:center;}
.btn{display:inline-block;margin-top:25px;padding:16px 35px;background:#ff004c;color:white;text-decoration:none;border-radius:14px;}
</style>
</head><body>
<video autoplay muted loop>
<source src="background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<audio id="bgmusic" autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">🔊 MUSIC</button>

<div id="authOverlay">
<div class="authBox">
<h1 style="color:#ff004c;">GRIZZLY FAMILY</h1>
<p style="margin-top:20px;">Авторизуйтесь через Discord</p>
<a id="loginBtn" class="btn" href="https://discord.com/oauth2/authorize?client_id=1506029366008610856&response_type=token&redirect_uri=https%3A%2F%2Fcrowsk1ck.github.io%2Fgrizzly-family&scope=identify%20email">LOGIN WITH DISCORD</a>
</div>
</div>

<div id="discordProfileBox">
<img id="discordAvatarTop" src="">
<div>
<h4 id="discordNameTop"></h4>
<button id="logoutBtn">LOGOUT</button>
</div>
</div>

<nav>
<div class="logo">GRIZZLY</div>
<div class="menu">
<a href="index.html">Інфо</a>
<a href="team.html">Команда</a>
<a href="gallery.html">Галерея</a>
<a href="contracts.html">Контракти</a>
<a href="apply.html">Заявка</a>
</div>
</nav>
<div class="container"><h1 class="title">Контракти</h1><div class="member">Скоро...</div></div>
<script>
document.addEventListener('click', ()=>{
const music = document.getElementById('bgmusic');
if(music){ music.play(); }
},{once:true});

const musicBtn = document.getElementById('musicBtn');
const music = document.getElementById('bgmusic');

if(musicBtn){
musicBtn.onclick = ()=>{
if(music.paused){
music.play();
musicBtn.innerHTML='🔊 MUSIC';
}else{
music.pause();
musicBtn.innerHTML='🔇 MUTED';
}
};
}

const fragment = new URLSearchParams(window.location.hash.substring(1));
const accessToken = fragment.get("access_token");

async function loadProfile(token){

try{

const response = await fetch("https://discord.com/api/users/@me",{
headers:{
authorization:`Bearer ${token}`
}
});

if(!response.ok){
localStorage.clear();
return;
}

const user = await response.json();

const avatar =
`https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;

localStorage.setItem("discord_token", token);
localStorage.setItem("discord_name", user.username);
localStorage.setItem("discord_avatar", avatar);

document.getElementById('authOverlay').style.display='none';
document.getElementById('discordProfileBox').style.display='flex';

document.getElementById('discordAvatarTop').src = avatar;
document.getElementById('discordNameTop').innerHTML = user.username;

}catch(err){
console.error(err);
}

}

function restoreProfile(){

const savedName = localStorage.getItem("discord_name");
const savedAvatar = localStorage.getItem("discord_avatar");

if(savedName && savedAvatar){

document.getElementById('authOverlay').style.display='none';
document.getElementById('discordProfileBox').style.display='flex';

document.getElementById('discordAvatarTop').src = savedAvatar;
document.getElementById('discordNameTop').innerHTML = savedName;

}

}

if(accessToken){

window.location.hash='';
loadProfile(accessToken);

}else{

const savedToken = localStorage.getItem('discord_token');

if(savedToken){
restoreProfile();
}else{
document.body.style.overflow='hidden';
}

}

document.getElementById('logoutBtn').onclick = ()=>{
localStorage.clear();
location.href='index.html';
};
</script>
</body></html>
