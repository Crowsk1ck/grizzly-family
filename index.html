<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grizzly Family</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

header{
    height:100vh;
    background:url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1920') center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.overlay{
    background:rgba(0,0,0,0.7);
    padding:50px;
    border-radius:20px;
}

h1{
    font-size:70px;
    color:#ff2d55;
}

p{
    font-size:22px;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:15px 40px;
    background:#ff2d55;
    color:white;
    text-decoration:none;
    border-radius:10px;
    transition:0.3s;
}

.btn:hover{
    background:#ff4f73;
}

section{
    padding:80px 10%;
}

.card{
    background:#151515;
    padding:30px;
    border-radius:20px;
    margin-top:20px;
}

footer{
    text-align:center;
    padding:30px;
    background:#111;
}
</style>

</head>
<body>

<header>
    <div class="overlay">
        <h1>GRIZZLY FAMILY</h1>
        <p>GTA 5 RP | NG Ukraine</p>
        <a href="#" class="btn">JOIN DISCORD</a>
    </div>
</header>

<section>
    <h2>О НАС</h2>

    <div class="card">
        Grizzly Family — одна из самых сильных семей на сервере NG Ukraine.
        Мы занимаемся RP, бизнесом, войнами и держим стиль.
    </div>
</section>

<section>
    <h2>СОСТАВ</h2>

    <div class="card">
        Leader — Maryana  
        Deputy — Zim  
        Members — 50+
    </div>
</section>

<footer>
    © 2026 Grizzly Family
</footer>

</body>
</html>
