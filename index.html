<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grizzly Family</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#050505;
color:white;
}

header{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:#0a0a0a;
}

.hero h1{
font-size:72px;
color:#ff004c;
}

.btn{
display:inline-block;
margin-top:20px;
padding:15px 35px;
background:#ff004c;
border-radius:12px;
text-decoration:none;
color:white;
}

section{
padding:80px 10%;
}

.card{
background:#111;
padding:30px;
border-radius:20px;
}

input,textarea{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
background:#1a1a1a;
color:white;
}

button{
margin-top:15px;
padding:15px;
width:100%;
background:#ff004c;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<div class="hero">
<h1>GRIZZLY FAMILY</h1>
<p>GTA 5 RP</p>
<a class="btn" href="https://discord.gg/">JOIN DISCORD</a>
</div>
</header>

<section>
<div class="card">

<h2>APPLICATION</h2>

<form id="form">

<input id="nick" type="text" placeholder="NickName" required>

<input id="discord" type="text" placeholder="Discord" required>

<textarea id="reason" placeholder="Почему хотите вступить"></textarea>

<button type="submit">SEND APPLICATION</button>

</form>

</div>
</section>

<script>

const webhookURL = "https://discord.com/api/webhooks/1505926641015328859/qqxDO6ncDEcjOu-2TfuA5VfRIq4V4VkBIaMGh5o51RM33RI0CUVDPZZ8pykQ_cnhNsj0";

document.getElementById("form").addEventListener("submit", async function(e){

e.preventDefault();

const nick = document.getElementById("nick").value;
const discord = document.getElementById("discord").value;
const reason = document.getElementById("reason").value;

const payload = {
content:
`📩 Новая заявка в Grizzly Family

👤 Nick: ${nick}
💬 Discord: ${discord}

📝 Причина:
${reason}`
};

try{

const response = await fetch(webhookURL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(payload)
});

if(response.ok){
alert("Заявка отправлена!");
document.getElementById("form").reset();
}else{
alert("Ошибка webhook!");
}

}catch(error){
console.error(error);
alert("Ошибка подключения!");
}

});

</script>

</body>
</html>
