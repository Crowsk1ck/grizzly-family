<!DOCTYPE html><html><head><title>Grizzly</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:Arial,sans-serif;
background:#050505;
color:white;
padding-top:110px;
overflow-x:hidden;
}

video{
position:fixed;
right:0;
bottom:0;
min-width:100%;
min-height:100%;
object-fit:cover;
z-index:-2;
filter:brightness(.25);
}

.overlay{
position:fixed;
inset:0;
background:linear-gradient(to bottom, rgba(0,0,0,.65), rgba(0,0,0,.92));
z-index:-1;
}

nav{
position:fixed;
top:0;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.45);
backdrop-filter:blur(10px);
z-index:999;
}

.logo{font-size:28px;font-weight:bold;color:#ff004c;}
.menu{display:flex;gap:18px;flex-wrap:wrap;}
.menu a{
text-decoration:none;
color:white;
padding:10px 18px;
border-radius:12px;
background:rgba(255,255,255,.05);
}

.container{padding:40px 10%;}
.title{font-size:48px;color:#ff004c;margin-bottom:30px;}
.card{background:rgba(17,17,17,.88);padding:30px;border-radius:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.member{background:#101010;padding:25px;border-radius:18px;}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;}
.gallery img{width:100%;border-radius:18px;}

#musicBtn{
position:fixed;
bottom:20px;
right:20px;
padding:14px 20px;
border:none;
border-radius:12px;
background:#ff004c;
color:white;
cursor:pointer;
z-index:9999;
}

#discordProfileBox{
position:fixed;
top:90px;
right:20px;
display:flex;
align-items:center;
gap:12px;
background:rgba(15,15,15,.92);
padding:12px 18px;
border-radius:16px;
z-index:9999;
}

#discordAvatarTop{
width:55px;
height:55px;
border-radius:50%;
border:2px solid #ff004c;
}

#logoutBtn{
margin-top:8px;
padding:8px 12px;
border:none;
border-radius:10px;
background:#ff004c;
color:white;
cursor:pointer;
}
</style>
</head><body>
<video autoplay muted loop>
<source src="background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<audio id="bgmusic" autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">🔊 MUSIC</button>

<div id="discordProfileBox">
<img id="discordAvatarTop" src="https://cdn.discordapp.com/embed/avatars/0.png">
<div>
<h4 id="discordNameTop">Discord User</h4>
<button id="logoutBtn">LOGOUT</button>
</div>
</div>

<nav>
<div class="logo">GRIZZLY</div>
<div class="menu">
<a href="index.html">Інфо</a>
<a href="team.html">Команда</a>
<a href="gallery.html">Галерея</a>
<a href="contracts.html">Контракти</a>
<a href="apply.html">Заявка</a>
</div>
</nav>
<div class="container"><h1 class="title">Інфо</h1><div class="card">Grizzly Family GTA RP</div></div>
<script>
const music = document.getElementById('bgmusic');
const musicBtn = document.getElementById('musicBtn');

document.addEventListener('click', ()=>{
music.play();
},{once:true});

musicBtn.onclick = ()=>{
if(music.paused){
music.play();
musicBtn.innerHTML='🔊 MUSIC';
}else{
music.pause();
musicBtn.innerHTML='🔇 MUTED';
}
};

document.getElementById('logoutBtn').onclick = ()=>{
localStorage.clear();
location.href='index.html';
};
</script>
</body></html>
